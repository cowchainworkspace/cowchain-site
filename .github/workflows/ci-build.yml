name: CI Build (diagnostic)

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install deps
        run: yarn install --frozen-lockfile
      - name: Build
        run: yarn build
        env:
          # Valid-format placeholders so module-load `new URL(...)` doesn't throw.
          # Real values live in Vercel env vars; here we only want to surface
          # compile errors vs build-time fetch errors.
          NEXT_PUBLIC_STRAPI_URL: https://example.com
          NEXT_PUBLIC_STRAPI_TOKEN: dummy
          NEXT_TELEMETRY_DISABLED: "1"
